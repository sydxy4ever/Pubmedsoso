<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pubmedsoso - PubMed Literature Crawler</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Pubmedsoso</h1>
            <p>PubMed Literature Crawler</p>
        </header>

        <section class="search-section">
            <h2>Search</h2>
            <form id="search-form">
                <div class="form-group">
                    <label for="keyword">Keyword:</label>
                    <input type="text" id="keyword" name="keyword" required placeholder="Enter search keyword...">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="page-num">Pages:</label>
                        <input type="number" id="page-num" name="page_num" value="10" min="1" max="100">
                    </div>
                    <div class="form-group">
                        <label for="download-num">PDF Downloads:</label>
                        <input type="number" id="download-num" name="download_num" value="10" min="0" max="100">
                    </div>
                    <div class="form-group checkbox">
                        <label>
                            <input type="checkbox" id="no-download" name="no_download">
                            Skip Downloads
                        </label>
                    </div>
                </div>
                <button type="submit" id="search-btn">Search</button>
            </form>
        </section>

        <section class="progress-section" id="progress-section" style="display: none;">
            <h2>Progress</h2>
            <div class="progress-info">
                <span id="progress-status">Pending...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <p id="progress-message"></p>
        </section>

        <section class="results-section">
            <h2>Results <span id="result-count"></span></h2>
            <div class="actions">
                <button id="export-xlsx" class="btn-secondary">Export XLSX</button>
                <button id="export-csv" class="btn-secondary">Export CSV</button>
            </div>
            <div class="table-container">
                <table id="results-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Title</th>
                            <th>Authors</th>
                            <th>Journal</th>
                            <th>PMID</th>
                            <th>Free</th>
                            <th>Review</th>
                        </tr>
                    </thead>
                    <tbody id="results-body"></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination"></div>
        </section>

        <section class="history-section">
            <h2>History</h2>
            <table id="history-table">
                <thead>
                    <tr>
                        <th>Task ID</th>
                        <th>Articles</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="history-body"></tbody>
            </table>
        </section>
    </div>

    <script src="/app.js"></script>
</body>
</html>
